
services:
  bot:
    build: .
    container_name: bot_max
    env_file:
      - .env
    depends_on:
      - db  
    ports: 
     - "8000:8000"
    restart: always 



  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot 
    depends_on:
      - bot

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot  



  db:
    image: postgres:15
    container_name: db_container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
     - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always





volumes:
  postgres_data: